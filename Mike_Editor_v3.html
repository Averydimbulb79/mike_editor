<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Markdown Editor</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #eef1f5;
      --app: #ffffff;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --line: #d8dde6;
      --line-2: #c8d0db;
      --text: #1f2732;
      --muted: #697586;
      --heading: #0f141a;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --shadow: 0 10px 30px rgba(20, 30, 50, 0.08);
      --shadow-soft: 0 2px 10px rgba(20, 30, 50, 0.05);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --editor-width: 50%;
      --topbar-h: 60px;
      --status-h: 42px;
      --font-ui: "Segoe UI", Inter, system-ui, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(180deg, #edf1f6 0%, #f7f9fb 100%);
    }

    body.drawer-open {
      overflow: hidden;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows:
        calc(var(--topbar-h) + var(--safe-top))
        auto
        auto
        minmax(0, 1fr)
        calc(var(--status-h) + var(--safe-bottom));
      background: var(--app);
    }

    .topbar {
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-left: 16px;
      padding-right: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow-soft);
      z-index: 60;
      position: relative;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .topbar-right {
      flex: 0 0 auto;
    }

    .app-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.25);
      flex: 0 0 auto;
    }

    .brand {
      min-width: 0;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--heading);
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .quick-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }

    .quick-btn,
    .file-label,
    .menu-btn,
    .drawer-btn {
      height: 38px;
      min-width: 38px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.15s ease;
      box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset;
      text-decoration: none;
    }

    .quick-btn:hover,
    .file-label:hover,
    .menu-btn:hover,
    .drawer-btn:hover {
      background: #fbfcfe;
      border-color: var(--line-2);
    }

    .quick-btn.primary,
    .drawer-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: none;
    }

    .quick-btn.primary:hover,
    .drawer-btn.primary:hover {
      background: #1f58d5;
      border-color: #1f58d5;
    }

    .menu-btn {
      display: none;
      min-width: 42px;
      padding: 0 12px;
      font-size: 18px;
      line-height: 1;
    }

    input[type="file"] {
      display: none;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 20, 26, 0.28);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 110;
      backdrop-filter: blur(2px);
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .side-drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(340px, 88vw);
      height: 100dvh;
      background: rgba(255,255,255,0.98);
      border-left: 1px solid var(--line);
      box-shadow: -12px 0 32px rgba(20, 30, 50, 0.14);
      transform: translateX(100%);
      transition: transform 0.24s ease;
      z-index: 120;
      display: grid;
      grid-template-rows: auto 1fr;
      backdrop-filter: blur(10px);
    }

    .side-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding-top: var(--safe-top);
      min-height: calc(60px + var(--safe-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-left: 14px;
      padding-right: 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .drawer-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--heading);
    }

    .drawer-close {
      width: 38px;
      padding: 0;
      font-size: 18px;
    }

    .drawer-body {
      overflow: auto;
      padding: 14px;
      padding-bottom: calc(14px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .drawer-section {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      overflow: hidden;
    }

    .drawer-section-title {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .drawer-section-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .drawer-btn {
      width: 100%;
      justify-content: flex-start;
      min-height: 40px;
      box-shadow: none;
    }

    .drawer-file-label {
      width: 100%;
      justify-content: flex-start;
    }

    .ribbon-tabs {
      display: flex;
      align-items: end;
      gap: 4px;
      padding: 8px 14px 0;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      overflow-x: auto;
    }

    .ribbon-tab {
      height: 36px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .ribbon-tab.active {
      background: white;
      color: var(--accent);
      border-color: var(--line);
    }

    .ribbon {
      background: white;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      overflow-x: auto;
      overflow-y: hidden;
      z-index: 30;
    }

    .ribbon::-webkit-scrollbar,
    .ribbon-tabs::-webkit-scrollbar {
      height: 10px;
    }

    .ribbon::-webkit-scrollbar-thumb,
    .ribbon-tabs::-webkit-scrollbar-thumb {
      background: #d4dae3;
      border-radius: 999px;
    }

    .ribbon-panel {
      display: none;
    }

    .ribbon-panel.active {
      display: block;
    }

    .ribbon-row {
      display: flex;
      align-items: stretch;
      gap: 10px;
      min-width: max-content;
    }

    .ribbon-group {
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: fit-content;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fafbfd 100%);
      border-radius: 12px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset;
      overflow: hidden;
    }

    .ribbon-group-body {
      display: flex;
      gap: 6px;
      padding: 8px;
      align-items: stretch;
      min-height: 72px;
    }

    .ribbon-group-label {
      border-top: 1px solid var(--line);
      background: #f7f9fb;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 4px 8px;
      letter-spacing: 0.01em;
    }

    .ribbon-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ribbon-stack {
      display: grid;
      grid-template-columns: repeat(2, minmax(42px, auto));
      gap: 6px;
    }

    .tool-btn {
      min-width: 42px;
      height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    .tool-btn:hover {
      background: #f8fbff;
      border-color: #b7c7e8;
    }

    .tool-btn.large {
      width: 88px;
      height: 64px;
      flex-direction: column;
      padding: 8px 6px;
      line-height: 1.05;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      white-space: normal;
    }

    .tool-btn.large .icon {
      font-size: 18px;
      line-height: 1;
    }

    .tool-btn.active {
      background: var(--accent-soft);
      border-color: #b8ccff;
      color: var(--accent);
    }

    .mobile-view-switch {
      display: none;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .mobile-switch-btn {
      flex: 1;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mobile-switch-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #bfd1ff;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(280px, var(--editor-width)) 8px minmax(280px, 1fr);
      background: #f4f6f9;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .pane-header {
      height: 44px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .pane-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--heading);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pane-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .editor-wrap {
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background: white;
    }

    .preview-wrap {
      min-height: 0;
      height: 100%;
      overflow: auto;
      background: white;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 100%;
      border: none;
      outline: none;
      resize: none;
      display: block;
      background: white;
      color: var(--text);
      padding: clamp(16px, 2vw, 28px);
      font: 15px/1.75 var(--font-mono);
      white-space: pre-wrap;
      overflow-wrap: break-word;
      tab-size: 2;
      overflow: auto;
    }

    .preview {
      min-height: 100%;
      padding: clamp(16px, 2vw, 32px);
      background: white;
      line-height: 1.75;
      color: var(--text);
    }

    .document-surface {
      max-width: 920px;
      margin: 0 auto;
      background: white;
      height: 100%;
    }

    .print-page {
      max-width: 920px;
      margin: 0 auto;
      background: white;
    }

    .mermaid-wrapper {
      margin: 1.2em 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfcfe;
      overflow: auto;
    }

    .mermaid-wrapper svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .mermaid-error {
      color: #b42318;
      background: #fff4f2;
      border: 1px solid #f5c2c7;
      border-radius: 10px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .resizer {
      position: relative;
      background: linear-gradient(180deg, #f0f3f7 0%, #e7ebf1 100%);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      cursor: col-resize;
    }

    .resizer::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 48px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: #cdd5e0;
    }

    .statusbar {
      padding: 0 16px calc(var(--safe-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-top: 1px solid var(--line);
      background: #fbfcfd;
      color: var(--muted);
      font-size: 12px;
      min-height: calc(var(--status-h) + var(--safe-bottom));
      flex-wrap: wrap;
    }

    .status-group {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      min-height: var(--status-h);
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      padding: 0 6px;
    }

    .preview h1,
    .preview h2,
    .preview h3,
    .preview h4,
    .preview h5,
    .preview h6,
    .print-page h1,
    .print-page h2,
    .print-page h3,
    .print-page h4,
    .print-page h5,
    .print-page h6 {
      color: var(--heading);
      line-height: 1.28;
      letter-spacing: -0.02em;
      margin: 1.25em 0 0.55em;
    }

    .preview h1,
    .print-page h1 {
      font-size: 2rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.24em;
    }

    .preview h2,
    .print-page h2 {
      font-size: 1.6rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.2em;
    }

    .preview h3,
    .print-page h3 {
      font-size: 1.28rem;
    }

    .preview p,
    .print-page p {
      margin: 0.9em 0;
    }

    .preview a,
    .print-page a {
      color: var(--accent);
      text-decoration: none;
    }

    .preview a:hover,
    .print-page a:hover {
      text-decoration: underline;
    }

    .preview blockquote,
    .print-page blockquote {
      margin: 1.2em 0;
      padding: 0.85em 1em;
      border-left: 4px solid var(--accent);
      background: #f6f9ff;
      color: #465468;
      border-radius: 0 10px 10px 0;
    }

    .preview hr,
    .print-page hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 2em 0;
    }

    .preview pre,
    .print-page pre {
      background: #1f2530;
      color: #f4f7fb;
      border-radius: 12px;
      padding: 16px;
      overflow: auto;
    }

    .preview code,
    .print-page code {
      font-family: var(--font-mono);
      font-size: 0.92em;
    }

    .preview :not(pre) > code,
    .print-page :not(pre) > code {
      background: #f1f3f6;
      border: 1px solid #e3e7ee;
      padding: 0.14em 0.4em;
      border-radius: 8px;
    }

    .preview table,
    .print-page table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      box-shadow: 0 0 0 1px var(--line) inset;
      border-radius: 12px;
      overflow: hidden;
    }

    .preview th,
    .preview td,
    .print-page th,
    .print-page td {
      border: 1px solid var(--line);
      padding: 11px 12px;
      text-align: left;
    }

    .preview th,
    .print-page th {
      background: #f7f9fb;
      font-weight: 700;
    }

    .preview img,
    .print-page img {
      max-width: 100%;
      border-radius: 12px;
    }

    .preview ul,
    .preview ol,
    .print-page ul,
    .print-page ol {
      padding-left: 1.5rem;
    }

    .preview li,
    .print-page li {
      margin: 0.3em 0;
    }

    @media (max-width: 1100px) {
      .brand-subtitle {
        display: none;
      }
    }

    @media (max-width: 920px) {
      .quick-actions {
        display: none;
      }

      .menu-btn {
        display: inline-flex;
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-rows:
          calc(var(--topbar-h) + var(--safe-top))
          auto
          auto
          auto
          minmax(0, 1fr)
          calc(var(--status-h) + var(--safe-bottom));
      }

      .topbar {
        padding-left: 12px;
        padding-right: 12px;
      }

      .mobile-view-switch {
        display: flex;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .resizer {
        display: none;
      }

      .pane.preview-pane {
        display: none;
      }

      .workspace.mobile-preview .pane.editor-pane {
        display: none;
      }

      .workspace.mobile-preview .pane.preview-pane {
        display: flex;
      }

      .ribbon {
        padding: 8px 10px;
      }

      .tool-btn.large {
        width: 70px;
        height: 60px;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        gap: 8px;
      }

      .app-badge {
        width: 34px;
        height: 34px;
        border-radius: 10px;
      }

      .brand-title {
        font-size: 15px;
      }

      .ribbon-tabs {
        padding: 8px 10px 0;
      }

      .ribbon-tab {
        padding: 0 12px;
      }

      .pane-header {
        padding: 0 12px;
      }

      .statusbar {
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    @media print {
      @page {
        size: auto;
        margin: 18mm 16mm 18mm 16mm;
      }

      html,
      body {
        background: white !important;
        overflow: visible !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      body {
        display: block !important;
      }

      body * {
        visibility: hidden !important;
      }

      .app,
      .workspace,
      .preview-pane,
      .preview-wrap,
      .document-surface,
      #preview,
      #preview *,
      #printPage,
      #printPage * {
        visibility: visible !important;
      }

      .topbar,
      .ribbon-tabs,
      .ribbon,
      .mobile-view-switch,
      .statusbar,
      .resizer,
      .editor-pane,
      .pane-header,
      .drawer-backdrop,
      .side-drawer {
        display: none !important;
      }

      .app,
      .workspace,
      .preview-pane,
      .preview-wrap,
      .document-surface,
      #preview {
        display: block !important;
        width: 100% !important;
        max-width: none !important;
        min-width: 0 !important;
        height: auto !important;
        min-height: 0 !important;
        overflow: visible !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        box-shadow: none !important;
        background: white !important;
      }

      #printPage {
        display: block !important;
        width: 100% !important;
        max-width: none !important;
        margin: 0 auto !important;
        padding: 8mm 10mm 10mm 10mm !important;
        background: white !important;
        color: black !important;
        border: none !important;
        box-shadow: none !important;
      }

      #printPage .mermaid-wrapper,
      #printPage svg,
      #printPage svg * {
        visibility: visible !important;
      }

      #printPage .mermaid-wrapper {
        overflow: visible !important;
        page-break-inside: avoid;
        break-inside: avoid;
        border: 1px solid #cfcfcf !important;
        background: #fff !important;
      }

      #printPage svg {
        display: block !important;
        max-width: 100% !important;
        height: auto !important;
        overflow: visible !important;
      }

      #printPage h1,
      #printPage h2,
      #printPage h3,
      #printPage h4,
      #printPage h5,
      #printPage h6 {
        page-break-after: avoid;
        break-after: avoid-page;
        color: black !important;
      }

      #printPage p,
      #printPage li,
      #printPage blockquote,
      #printPage pre,
      #printPage table,
      #printPage img,
      #printPage .mermaid-wrapper {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      #printPage a {
        color: black !important;
        text-decoration: none !important;
      }

      #printPage pre,
      #printPage code {
        white-space: pre-wrap !important;
        word-break: break-word !important;
      }

      #printPage pre {
        background: #f3f4f6 !important;
        color: black !important;
        border: 1px solid #cfcfcf !important;
      }

      #printPage :not(pre) > code {
        background: #f3f4f6 !important;
        color: black !important;
        border: 1px solid #d8d8d8 !important;
      }

      #printPage table {
        width: 100% !important;
        border-collapse: collapse !important;
        box-shadow: none !important;
      }

      #printPage th,
      #printPage td {
        border: 1px solid #999 !important;
        padding: 8px 10px !important;
      }

      #printPage th {
        background: #f3f4f6 !important;
      }

      #printPage img {
        max-width: 100% !important;
        height: auto !important;
      }

      #printPage blockquote {
        background: #f8f8f8 !important;
        color: black !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="app-badge">M</div>
        <div class="brand">
          <div class="brand-title">Markdown Editor</div>

        </div>
      </div>

      <div class="topbar-right">

          <button class="quick-btn" id="copyHtmlBtn" type="button">Copy HTML</button>

        <button class="menu-btn" id="menuToggleBtn" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
        <input id="importFile" type="file" accept=".md,.markdown,.txt" />

    <div class="ribbon-tabs" id="ribbonTabs">

      <button class="ribbon-tab" type="button" data-tab="view">View</button>
      <button class="ribbon-tab" type="button" data-tab="export">Export</button>

    <section class="ribbon">
      <div class="ribbon-panel active" data-panel="home">
        <div class="ribbon-row">
          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <button class="tool-btn large" id="toggleWrapBtn" type="button">
                <span class="icon">↔</span>
                <span>Wrap On</span>

              <button class="tool-btn large" id="insertDateBtn" type="button">
                <span class="icon">📅</span>
                <span>Date</span>
              </button>
            </div>
            <div class="ribbon-group-label">Document</div>
          </div>

          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <div class="ribbon-col">
                <button class="tool-btn" data-action="h1" type="button">Heading 1</button>
                <button class="tool-btn" data-action="h2" type="button">Heading 2</button>
              </div>
              <div class="ribbon-col">
                <button class="tool-btn" data-action="h3" type="button">Heading 3</button>
                <button class="tool-btn" data-action="quote" type="button">Quote</button>
              </div>
            </div>
            <div class="ribbon-group-label">Styles</div>
          </div>

          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <button class="tool-btn large" data-action="bold" type="button">
                <span class="icon"><strong>B</strong></span>
                <span>Bold</span>
              </button>
              <button class="tool-btn large" data-action="italic" type="button">
                <span class="icon"><em>I</em></span>

              <button class="tool-btn large" data-action="strike" type="button">
                <span class="icon"><s>S</s></span>
                <span>Strike</span>

            </div>
            <div class="ribbon-group-label">Font</div>
          </div>

          <div class="ribbon-group">
            <div class="ribbon-group-body">

                <button class="tool-btn" data-action="ul" type="button">Bullets</button>
                <button class="tool-btn" data-action="ol" type="button">Numbers</button>
                <button class="tool-btn" data-action="task" type="button">Tasks</button>
                <button class="tool-btn" data-action="hr" type="button">Rule</button>

            </div>
            <div class="ribbon-group-label">Paragraph</div>

        </div>
      </div>

      <div class="ribbon-panel" data-panel="insert">
        <div class="ribbon-row">
          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <div class="ribbon-col">
                <button class="tool-btn" data-action="link" type="button">Link</button>
                <button class="tool-btn" data-action="image" type="button">Image</button>
              </div>
              <div class="ribbon-col">
                <button class="tool-btn" data-action="table" type="button">Table</button>
                <button class="tool-btn" data-action="codeblock" type="button">Code Block</button>
              </div>
            </div>
            <div class="ribbon-group-label">Insert</div>
          </div>

          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <button class="tool-btn large" data-action="code" type="button">
                <span class="icon">&lt;/&gt;</span>
                <span>Inline Code</span>
              </button>
              <button class="tool-btn large" data-action="mermaid" type="button">
                <span class="icon">◇</span>
                <span>Mermaid</span>
              </button>
            </div>
            <div class="ribbon-group-label">Diagrams</div>
          </div>
        </div>
      </div>

      <div class="ribbon-panel" data-panel="view">
        <div class="ribbon-row">
          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <button class="tool-btn large" id="fullscreenRibbonBtn" type="button">
                <span class="icon">⛶</span>
                <span>Fullscreen</span>
              </button>
              <button class="tool-btn large" id="toggleMobileWriteBtn" type="button">
                <span class="icon">✎</span>
                <span>Write View</span>
              </button>
              <button class="tool-btn large" id="toggleMobilePreviewBtn" type="button">
                <span class="icon">👁</span>
                <span>Preview View</span>
              </button>
            </div>
            <div class="ribbon-group-label">Display</div>
          </div>

          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <div class="ribbon-col">
                <button class="tool-btn" id="panePreset40" type="button">Editor 40%</button>
                <button class="tool-btn" id="panePreset50" type="button">Editor 50%</button>
              </div>
              <div class="ribbon-col">
                <button class="tool-btn" id="panePreset60" type="button">Editor 60%</button>
                <button class="tool-btn" id="panePreset70" type="button">Editor 70%</button>
              </div>
            </div>
            <div class="ribbon-group-label">Pane Width</div>
          </div>
        </div>

      <div class="ribbon-panel" data-panel="export">
        <div class="ribbon-row">
          <div class="ribbon-group">
            <div class="ribbon-group-body">
              <button class="tool-btn large" id="exportRibbonBtn" type="button">
                <span class="icon">⇩</span>
                <span>Export MD</span>
              </button>
              <button class="tool-btn large" id="copyRibbonBtn" type="button">
                <span class="icon">⧉</span>
                <span>Copy HTML</span>
              </button>
              <button class="tool-btn large" id="printRibbonBtn" type="button">
                <span class="icon">🖨</span>
                <span>Print</span>

    <div class="mobile-view-switch">
      <button class="mobile-switch-btn active" id="writeTab" type="button">Write</button>
      <button class="mobile-switch-btn" id="previewTab" type="button">Preview</button>
    </div>

    <main class="workspace" id="workspace">
      <section class="pane editor-pane">
        <div class="pane-header">
          <div class="pane-title">Editor</div>
          <div class="pane-meta"><span class="kbd">Tab</span> inserts spaces</div>
        </div>
        <div class="editor-wrap">
          <div class="document-surface">
            <textarea id="editor" spellcheck="false"></textarea>
          </div>
        </div>
      </section>

      <div class="resizer" id="resizer" aria-label="Resize panes"></div>

      <section class="pane preview-pane">
        <div class="pane-header">
          <div class="pane-title">Preview</div>
          <div class="pane-meta" id="renderState">Rendered</div>
        </div>
        <div class="preview-wrap">
          <div class="document-surface">
            <div class="preview" id="preview">
              <div class="print-page" id="printPage"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="statusbar">
      <div class="status-group">
        <span id="wordCount">Words: 0</span>
        <span id="charCount">Characters: 0</span>
        <span id="lineCount">Lines: 1</span>
      </div>
      <div class="status-group">
        <span id="saveState">Saved locally</span>
        <span id="cursorState">Ln 1, Col 1</span>
      </div>
    </footer>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="side-drawer" id="sideDrawer" aria-hidden="true">
    <div class="drawer-header">
      <div class="drawer-title">Actions</div>
      <button class="drawer-btn drawer-close" id="drawerCloseBtn" type="button" aria-label="Close menu">✕</button>
    </div>

    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-section-title">File</div>
        <div class="drawer-section-body">
          <button class="drawer-btn primary" id="drawerNewBtn" type="button">New</button>
          <label class="file-label drawer-btn drawer-file-label" for="importFile">Import</label>
          <button class="drawer-btn" id="drawerExportBtn" type="button">Export</button>
          <button class="drawer-btn" id="drawerCopyHtmlBtn" type="button">Copy HTML</button>
          <button class="drawer-btn" id="drawerPrintBtn" type="button">Print</button>
          <button class="drawer-btn" id="drawerFullscreenBtn" type="button">Fullscreen</button>
        </div>
      </div>

      <div class="drawer-section">
        <div class="drawer-section-title">Quick Insert</div>
        <div class="drawer-section-body">
          <button class="drawer-btn" data-drawer-action="h1" type="button">Heading 1</button>
          <button class="drawer-btn" data-drawer-action="bold" type="button">Bold</button>
          <button class="drawer-btn" data-drawer-action="italic" type="button">Italic</button>
          <button class="drawer-btn" data-drawer-action="link" type="button">Link</button>
          <button class="drawer-btn" data-drawer-action="table" type="button">Table</button>
          <button class="drawer-btn" data-drawer-action="codeblock" type="button">Code Block</button>
          <button class="drawer-btn" data-drawer-action="mermaid" type="button">Mermaid</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    const STORAGE_KEY = "markdown_editor_word_ribbon_v11_mermaid_print_fix";
    const WRAP_KEY = "markdown_editor_word_ribbon_wrap_v11_mermaid_print_fix";
    const TAB_KEY = "markdown_editor_word_ribbon_active_tab_v11";

    const editor = document.getElementById("editor");
    const printPage = document.getElementById("printPage");
    const workspace = document.getElementById("workspace");
    const resizer = document.getElementById("resizer");

    const wordCount = document.getElementById("wordCount");
    const charCount = document.getElementById("charCount");
    const lineCount = document.getElementById("lineCount");
    const saveState = document.getElementById("saveState");
    const cursorState = document.getElementById("cursorState");
    const renderState = document.getElementById("renderState");
    const importFile = document.getElementById("importFile");
    const toggleWrapBtn = document.getElementById("toggleWrapBtn");
    const writeTab = document.getElementById("writeTab");
    const previewTab = document.getElementById("previewTab");

    const menuToggleBtn = document.getElementById("menuToggleBtn");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const sideDrawer = document.getElementById("sideDrawer");
    const drawerCloseBtn = document.getElementById("drawerCloseBtn");
    const drawerNewBtn = document.getElementById("drawerNewBtn");
    const drawerExportBtn = document.getElementById("drawerExportBtn");
    const drawerCopyHtmlBtn = document.getElementById("drawerCopyHtmlBtn");
    const drawerPrintBtn = document.getElementById("drawerPrintBtn");
    const drawerFullscreenBtn = document.getElementById("drawerFullscreenBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const fullscreenRibbonBtn = document.getElementById("fullscreenRibbonBtn");

    const ribbonTabs = [...document.querySelectorAll(".ribbon-tab")];
    const ribbonPanels = [...document.querySelectorAll(".ribbon-panel")];

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: "loose",
      theme: "default"
    });

    const starter = `# Welcome

This version fixes Mermaid printing more reliably.

## Ribbon Tabs

- Home for formatting
- Insert for links, tables, code and Mermaid
- View for layout and fullscreen
- Export for output actions

## Mermaid Example

\`\`\`mermaid
flowchart TD
  A[Open Editor] --> B{Need Diagram?}
  B -->|Yes| C[Insert Mermaid Block]
  B -->|No| D[Keep Writing]
  C --> E[Preview Renders Diagram]
  D --> E
\`\`\`

> The print preview should now stop fainting when it sees a diagram.

| Feature | Status |
|---|---|
| Multi-tab Ribbon | Ready |
| Mermaid Preview | Ready |
| Mermaid Print | Fixed |
| Side Drawer | Ready |
| Fullscreen | Ready |

`;

    marked.setOptions({
      breaks: true,
      gfm: true
    });

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function renderMermaidIn(container) {
      const blocks = [...container.querySelectorAll("pre > code.language-mermaid")];
      if (!blocks.length) return;

      let index = 0;

      for (const code of blocks) {
        const pre = code.parentElement;
        const source = code.textContent || "";
        const wrapper = document.createElement("div");
        wrapper.className = "mermaid-wrapper";

        try {
          const id = `mermaid-${Date.now()}-${index++}`;
          const { svg } = await mermaid.render(id, source);

          wrapper.innerHTML = svg;

          const renderedSvg = wrapper.querySelector("svg");
          if (renderedSvg) {
            renderedSvg.removeAttribute("width");
            renderedSvg.removeAttribute("height");
            renderedSvg.style.maxWidth = "100%";
            renderedSvg.style.height = "auto";
            renderedSvg.style.display = "block";
          }
        } catch (err) {
          wrapper.innerHTML = `<div class="mermaid-error">Mermaid render error\n\n${escapeHtml(String(err))}</div>`;
        }

        pre.replaceWith(wrapper);
      }
    }

    async function nextFrame() {
      await new Promise((resolve) => requestAnimationFrame(resolve));
    }

    async function render() {
      try {
        const raw = marked.parse(editor.value);
        const safe = DOMPurify.sanitize(raw);
        printPage.innerHTML = safe;

        await renderMermaidIn(printPage);

        await nextFrame();
        await nextFrame();

        renderState.textContent = "Rendered";
      } catch (err) {
        printPage.innerHTML = "<p style='color:#c53030;'>Rendering error</p>";
        renderState.textContent = "Render error";
      }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, editor.value);
      saveState.textContent = "Saved locally";
    }

    function load() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const wrap = localStorage.getItem(WRAP_KEY);
      const activeTab = localStorage.getItem(TAB_KEY) || "home";
      editor.value = saved ?? starter;
      setWrap(wrap !== "off");
      setRibbonTab(activeTab);
      render();
      updateStats();
      updateCursor();
      updateFullscreenButtons();
    }

    function updateStats() {
      const text = editor.value;
      const words = (text.trim().match(/\S+/g) || []).length;
      const chars = text.length;
      const lines = text.split("\n").length;

      wordCount.textContent = `Words: ${words}`;
      charCount.textContent = `Characters: ${chars}`;
      lineCount.textContent = `Lines: ${lines}`;
    }

    function updateCursor() {
      const pos = editor.selectionStart;
      const before = editor.value.slice(0, pos);
      const lines = before.split("\n");
      const line = lines.length;
      const col = lines[lines.length - 1].length + 1;
      cursorState.textContent = `Ln ${line}, Col ${col}`;
    }

    function setWrap(on) {
      editor.style.whiteSpace = on ? "pre-wrap" : "pre";
      editor.style.overflowX = on ? "hidden" : "auto";
      toggleWrapBtn.querySelector("span:last-child").textContent = on ? "Wrap On" : "Wrap Off";
      toggleWrapBtn.classList.toggle("active", on);
      localStorage.setItem(WRAP_KEY, on ? "on" : "off");
    }

    function setRibbonTab(name) {
      ribbonTabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === name);
      });
      ribbonPanels.forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.panel === name);
      });
      localStorage.setItem(TAB_KEY, name);
    }

    async function triggerUpdate() {
      await render();
      save();
      updateStats();
      updateCursor();
    }

    function insertText(before, after = "", placeholder = "") {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const value = editor.value;
      const selected = value.slice(start, end) || placeholder;

      editor.value =
        value.slice(0, start) +
        before +
        selected +
        after +
        value.slice(end);

      editor.focus();
      editor.setSelectionRange(start + before.length, start + before.length + selected.length);
      triggerUpdate();
    }

    function insertLine(prefix, placeholder = "Text") {
      const start = editor.selectionStart;
      const value = editor.value;
      const lineStart = value.lastIndexOf("\n", start - 1) + 1;

      editor.value =
        value.slice(0, lineStart) +
        prefix +
        placeholder +
        value.slice(lineStart);

      editor.focus();
      editor.setSelectionRange(
        lineStart + prefix.length,
        lineStart + prefix.length + placeholder.length
      );
      triggerUpdate();
    }

    function insertBlock(block) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const value = editor.value;

      editor.value = value.slice(0, start) + block + value.slice(end);
      editor.focus();
      editor.setSelectionRange(start + block.length, start + block.length);
      triggerUpdate();
    }

    function insertMermaidTemplate() {
      insertBlock(
`\n\`\`\`mermaid
flowchart TD
  A[Start] --> B{Decision}
  B -->|Yes| C[Continue]
  B -->|No| D[Stop]
\`\`\`\n`
      );
    }

    function exportMarkdown() {
      const blob = new Blob([editor.value], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
      a.href = url;
      a.download = `markdown-${stamp}.md`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function copyHtml() {
      const raw = marked.parse(editor.value);
      const safe = DOMPurify.sanitize(raw);
      try {
        await navigator.clipboard.writeText(safe);
        saveState.textContent = "HTML copied";
        setTimeout(() => {
          saveState.textContent = "Saved locally";
        }, 1200);
      } catch {
        saveState.textContent = "Clipboard blocked";
        setTimeout(() => {
          saveState.textContent = "Saved locally";
        }, 1200);
      }
    }

    async function printPreview() {
      saveState.textContent = "Preparing print";

      await render();
      await nextFrame();
      await nextFrame();

      setTimeout(() => {
        window.print();
        saveState.textContent = "Saved locally";
      }, 180);
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
        updateFullscreenButtons();
      } catch (err) {
        saveState.textContent = "Fullscreen blocked";
        setTimeout(() => {
          saveState.textContent = "Saved locally";
        }, 1200);
      }
    }

    function updateFullscreenButtons() {
      const isFullscreen = !!document.fullscreenElement;
      const label = isFullscreen ? "Exit Fullscreen" : "Fullscreen";
      if (fullscreenBtn) fullscreenBtn.textContent = label;
      if (drawerFullscreenBtn) drawerFullscreenBtn.textContent = label;
      if (fullscreenRibbonBtn) fullscreenRibbonBtn.querySelector("span:last-child").textContent = label;
    }

    function handleToolbar(action) {
      const actions = {
        h1: () => insertLine("# ", "Heading 1"),
        h2: () => insertLine("## ", "Heading 2"),
        h3: () => insertLine("### ", "Heading 3"),
        bold: () => insertText("**", "**", "bold text"),
        italic: () => insertText("*", "*", "italic text"),
        strike: () => insertText("~~", "~~", "strikethrough"),
        code: () => insertText("`", "`", "inline code"),
        quote: () => insertLine("> ", "quoted text"),
        ul: () => insertLine("- ", "list item"),
        ol: () => insertLine("1. ", "list item"),
        task: () => insertLine("- [ ] ", "task item"),
        link: () => insertText("[", "](https://example.com)", "link text"),
        image: () => insertText("![", "](https://example.com/image.jpg)", "alt text"),
        table: () => insertBlock("\n| Column 1 | Column 2 |\n|---|---|\n| Value 1 | Value 2 |\n"),
        hr: () => insertBlock("\n---\n"),
        codeblock: () => insertBlock("\n```js\nconsole.log('Hello');\n```\n"),
        mermaid: () => insertMermaidTemplate()
      };

      if (actions[action]) actions[action]();
    }

    function newDocument() {
      if (confirm("Clear the current document and start a new one?")) {
        editor.value = "";
        triggerUpdate();
      }
    }

    function openDrawer() {
      sideDrawer.classList.add("open");
      drawerBackdrop.classList.add("open");
      document.body.classList.add("drawer-open");
      sideDrawer.setAttribute("aria-hidden", "false");
      menuToggleBtn.setAttribute("aria-expanded", "true");
    }

    function closeDrawer() {
      sideDrawer.classList.remove("open");
      drawerBackdrop.classList.remove("open");
      document.body.classList.remove("drawer-open");
      sideDrawer.setAttribute("aria-hidden", "true");
      menuToggleBtn.setAttribute("aria-expanded", "false");
    }

    function toggleDrawer() {
      if (sideDrawer.classList.contains("open")) {
        closeDrawer();
      } else {
        openDrawer();
      }
    }

    function setPaneWidth(percent) {
      const clamped = Math.min(78, Math.max(32, percent));
      document.documentElement.style.setProperty("--editor-width", `${clamped}%`);
    }

    ribbonTabs.forEach((tab) => {
      tab.addEventListener("click", () => setRibbonTab(tab.dataset.tab));
    });

    document.querySelectorAll("[data-action]").forEach((btn) => {
      btn.addEventListener("click", () => handleToolbar(btn.dataset.action));
    });

    document.querySelectorAll("[data-drawer-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        handleToolbar(btn.dataset.drawerAction);
        closeDrawer();
      });
    });

    document.getElementById("insertDateBtn").addEventListener("click", () => {
      const d = new Date();
      const text = d.toLocaleDateString(undefined, {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
      insertText("", "", text);
    });

    document.getElementById("newDocBtn").addEventListener("click", newDocument);
    drawerNewBtn.addEventListener("click", () => {
      closeDrawer();
      newDocument();
    });

    document.getElementById("exportMdBtn").addEventListener("click", exportMarkdown);
    drawerExportBtn.addEventListener("click", () => {
      closeDrawer();
      exportMarkdown();
    });
    document.getElementById("exportRibbonBtn").addEventListener("click", exportMarkdown);

    document.getElementById("copyHtmlBtn").addEventListener("click", copyHtml);
    drawerCopyHtmlBtn.addEventListener("click", () => {
      closeDrawer();
      copyHtml();
    });
    document.getElementById("copyRibbonBtn").addEventListener("click", copyHtml);

    document.getElementById("printBtn").addEventListener("click", printPreview);
    drawerPrintBtn.addEventListener("click", () => {
      closeDrawer();
      printPreview();
    });
    document.getElementById("printRibbonBtn").addEventListener("click", printPreview);

    fullscreenBtn.addEventListener("click", toggleFullscreen);
    fullscreenRibbonBtn.addEventListener("click", toggleFullscreen);
    drawerFullscreenBtn.addEventListener("click", () => {
      closeDrawer();
      toggleFullscreen();
    });

    document.getElementById("toggleMobileWriteBtn").addEventListener("click", () => {
      workspace.classList.remove("mobile-preview");
      writeTab.classList.add("active");
      previewTab.classList.remove("active");
    });

    document.getElementById("toggleMobilePreviewBtn").addEventListener("click", () => {
      workspace.classList.add("mobile-preview");
      previewTab.classList.add("active");
      writeTab.classList.remove("active");
    });

    document.getElementById("panePreset40").addEventListener("click", () => setPaneWidth(40));
    document.getElementById("panePreset50").addEventListener("click", () => setPaneWidth(50));
    document.getElementById("panePreset60").addEventListener("click", () => setPaneWidth(60));
    document.getElementById("panePreset70").addEventListener("click", () => setPaneWidth(70));

    menuToggleBtn.addEventListener("click", toggleDrawer);
    drawerCloseBtn.addEventListener("click", closeDrawer);
    drawerBackdrop.addEventListener("click", closeDrawer);
    document.addEventListener("fullscreenchange", updateFullscreenButtons);

    toggleWrapBtn.addEventListener("click", () => {
      const isOn = toggleWrapBtn.classList.contains("active");
      setWrap(!isOn);
    });

    importFile.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        editor.value = String(evt.target.result || "");
        triggerUpdate();
        closeDrawer();
      };
      reader.readAsText(file);
      importFile.value = "";
    });

    editor.addEventListener("input", triggerUpdate);
    editor.addEventListener("click", updateCursor);
    editor.addEventListener("keyup", updateCursor);
    editor.addEventListener("select", updateCursor);

    editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const value = editor.value;
        editor.value = value.slice(0, start) + "  " + value.slice(end);
        editor.setSelectionRange(start + 2, start + 2);
        triggerUpdate();
      }

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "s") {
        e.preventDefault();
        exportMarkdown();
      }

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "b") {
        e.preventDefault();
        insertText("**", "**", "bold text");
      }

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "i") {
        e.preventDefault();
        insertText("*", "*", "italic text");
      }

      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "p") {
        e.preventDefault();
        printPreview();
      }

      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === "f") {
        e.preventDefault();
        toggleFullscreen();
      }

      if (e.key === "Escape") {
        closeDrawer();
      }
    });

    writeTab.addEventListener("click", () => {
      workspace.classList.remove("mobile-preview");
      writeTab.classList.add("active");
      previewTab.classList.remove("active");
    });

    previewTab.addEventListener("click", () => {
      workspace.classList.add("mobile-preview");
      previewTab.classList.add("active");
      writeTab.classList.remove("active");
    });

    let isDragging = false;

    resizer.addEventListener("mousedown", () => {
      if (window.innerWidth <= 900) return;
      isDragging = true;
      document.body.style.userSelect = "none";
      document.body.style.cursor = "col-resize";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging || window.innerWidth <= 900) return;
      const rect = workspace.getBoundingClientRect();
      const percent = ((e.clientX - rect.left) / rect.width) * 100;
      const clamped = Math.min(78, Math.max(32, percent));
      document.documentElement.style.setProperty("--editor-width", `${clamped}%`);
    });

    window.addEventListener("mouseup", () => {
      isDragging = false;
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 920) {
        closeDrawer();
      }
    });

    load();
  </script>
</body>
</html>
